name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to CalendarBar!
        
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: I would like CalendarBar to...
    validations:
      required: true
      
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature help you?
      placeholder: This would be useful when...
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there any workarounds or alternatives you've tried?
      placeholder: Currently, I have to...
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any mockups, examples, or other information
      placeholder: Here's how I imagine it could work...
